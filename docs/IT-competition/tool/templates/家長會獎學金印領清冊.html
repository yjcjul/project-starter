<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>{{ school }} 家長會獎金印領清冊</title>
<style>
  @page { size: A4; margin: 15mm 15mm 15mm 20mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "標楷體", "DFKai-SB", serif; font-size: 12pt; }
  h1 { text-align: center; font-size: 15pt; margin-bottom: 10pt; }
  .approvers { display: flex; justify-content: space-around; font-size: 11pt; margin-bottom: 12pt; }
  .approver { text-align: center; min-width: 80pt; }
  .approvers { margin-top: 20pt; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #000; padding: 6pt 8pt; text-align: center; vertical-align: middle; }
  th { font-weight: bold; }
  td.left { text-align: left; }
  .total-row td { font-weight: bold; }
</style>
</head>
<body>
<h1>{{ school }}<br>家長會獎金印領清冊</h1>

<table>
  <tr>
    <th>編號</th>
    <th>申請項目</th>
    <th>名次</th>
    <th>班級</th>
    <th>得獎學生／教師</th>
    <th>獎金</th>
    <th>簽名</th>
  </tr>
  {% for e in entries %}
  <tr>
    <td>{{ loop.index }}</td>
    <td class="left">{{ competition }}-「{{ e.item }}」</td>
    <td>{{ e.rank }}</td>
    <td>{{ e.class }}</td>
    <td>{{ e.name }}</td>
    <td>{{ e.prize }}元</td>
    <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</td>
  </tr>
  {% endfor %}
  <tr class="total-row">
    <td colspan="5" style="text-align:right">總計</td>
    <td>{{ total }}元整</td>
    <td></td>
  </tr>
</table>

<div class="approvers">
  <div class="approver">資訊組</div>
  <div class="approver">教務主任</div>
  <div class="approver">家長會</div>
  <div class="approver">校長</div>
</div>
</body>
</html>
